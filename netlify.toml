[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  # Functions run on the same Node version as the build (Netlify default).
  # firebase-admin@14 → jwks-rsa@4 → jose@6 needs Node >= 22 (require() of
  # ES modules); on older runtimes every function importing firebase-admin
  # crashes at load with ERR_REQUIRE_ESM and returns 502.
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "nft"

[dev]
  command = "npm run dev"
  targetPort = 8080
  port = 8888

# Serve the dynamic sitemap from the Netlify function.
# Status 200 = rewrite (URL stays /sitemap.xml in the browser/crawler).
# force = true is required because public/sitemap.xml exists as a static file —
# without it, Netlify CDN serves the static file and ignores this redirect.
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200
  force = true

# SPA catch-all — production ONLY.
# netlify dev ignores [context.production] blocks, so Vite handles routing in dev.
# Without this, React Router sub-routes (e.g. /fr/blog/my-article) return 404 on Netlify CDN.
[[context.production.redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
