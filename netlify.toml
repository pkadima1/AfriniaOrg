[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  # Functions run on the same Node version as the build (Netlify default).
  # Keep >= 22: firebase-admin@14 declares engines.node >= 22. Note the AWS
  # Lambda nodejs22.x image runs a Node build < 22.12 without require(esm),
  # which is why package.json pins jwks-rsa to 3.x (jose v4, dual CJS/ESM) —
  # jwks-rsa@4 pulls the ESM-only jose v6 and crashes every function that
  # imports firebase-admin at load (ERR_REQUIRE_ESM → 502).
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "nft"

[dev]
  command = "npm run dev"
  targetPort = 8080
  port = 8888

# Serve the dynamic sitemap from the Netlify function.
# Status 200 = rewrite (URL stays /sitemap.xml in the browser/crawler).
# force = true is required because public/sitemap.xml exists as a static file —
# without it, Netlify CDN serves the static file and ignores this redirect.
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200
  force = true

# SPA catch-all lives in public/_redirects, NOT here.
# [[context.production.redirects]] is silently ignored by Netlify — redirects
# and headers cannot be scoped to deploy contexts in netlify.toml (docs:
# file-based configuration → deploy contexts). Defining it there broke all
# deep-route reloads from 2026-07-01 to 2026-07-08.
