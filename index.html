
<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon ──────────────────────────────────────────────────────── -->
    <!-- SVG is preferred (scales perfectly to any size, matches brand exactly).
         The .ico fallback serves older browsers that do not support SVG favicons. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- ── Canonical ───────────────────────────────────────────────── -->
    <link rel="canonical" href="https://afrinia.org/" />

    <!-- ── Primary meta ──────────────────────────────────────────────── -->
    <title>Afrinia — Intelligence for Africa's Builders</title>
    <meta name="description" content="Ideas, analysis and tools for entrepreneurs and innovators across Africa. Bilingual intelligence feed in English and French." />
    <meta name="author" content="Afrinia" />
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph ────────────────────────────────────────────────── -->
    <meta property="og:site_name" content="Afrinia" />
    <meta property="og:title" content="Afrinia — Intelligence for Africa's Builders" />
    <meta property="og:description" content="Ideas, analysis and tools for entrepreneurs and innovators across Africa. Bilingual intelligence feed in English and French." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://afrinia.org/" />
    <meta property="og:image" content="https://firebasestorage.googleapis.com/v0/b/modified-hull-203004.firebasestorage.app/o/Media%2Fabout1.png?alt=media&token=7ccaaeb4-f339-4e06-8cab-97d300d8c2aa" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- ── Twitter Card ───────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@AfriniaHQ" />
    <meta name="twitter:title" content="Afrinia — Intelligence for Africa's Builders" />
    <meta name="twitter:description" content="Ideas, analysis and tools for entrepreneurs and innovators across Africa." />
    <meta name="twitter:image" content="https://firebasestorage.googleapis.com/v0/b/modified-hull-203004.firebasestorage.app/o/Media%2Fabout1.png?alt=media&token=7ccaaeb4-f339-4e06-8cab-97d300d8c2aa" />

    <!-- ── Fonts: preconnect + single combined stylesheet request ─────── -->
    <!-- Loading all three families in one <link> is faster than @import  -->
    <!-- in CSS (fires in parallel with CSS parse, not after it).         -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&family=Inter:wght@300;400;500;600;700;800&display=swap"
    />

    <!-- ── Site-level JSON-LD (static, always present) ───────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://afrinia.org/#organization",
          "name": "Afrinia",
          "url": "https://afrinia.org",
          "description": "Intelligence for Africa's builders — ideas, analysis and tools for entrepreneurs and innovators across the continent.",
          "logo": {
            "@type": "ImageObject",
            "url": "https://afrinia.org/logo.png"
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://afrinia.org/#website",
          "name": "Afrinia",
          "url": "https://afrinia.org",
          "publisher": { "@id": "https://afrinia.org/#organization" },
          "inLanguage": ["fr", "en"]
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <!-- IMPORTANT: DO NOT REMOVE THIS SCRIPT TAG OR THIS VERY COMMENT! -->
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
